<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#150830"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Border -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.55"/>
  <!-- W lettermark with neon glow -->
  <path
    d="M 4.5,8 L 9.5,24 L 16,13.5 L 22.5,24 L 27.5,8"
    fill="none"
    stroke="#c084fc"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
</svg>
